name: Build IPTV Player APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          cmdline-tools: latest

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Prepare release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          echo "RELEASE_STORE_FILE=release.keystore" >> "$GITHUB_ENV"
          echo "RELEASE_STORE_PASSWORD=android" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=release" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=android" >> "$GITHUB_ENV"

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon
        env:
          RELEASE_STORE_FILE: release.keystore
          RELEASE_STORE_PASSWORD: android
          RELEASE_KEY_ALIAS: release
          RELEASE_KEY_PASSWORD: android

      - name: Locate APK
        id: find_apk
        run: |
          set -e
          APK_PATH=$(find app/build/outputs -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK found under app/build/outputs"
            ls -R app/build/outputs || true
            exit 1
          fi
          echo "apk=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Rename signed APK to friendly name
        run: |
          mkdir -p dist
          cp "${{ steps.find_apk.outputs.apk }}" dist/worldcup-iptv-player.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: dist/worldcup-iptv-player.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build-${{ github.run_number }}
          name: Release v1.0.0-build-${{ github.run_number }}
          body: Automated signed build from commit ${{ github.sha }}
          files: dist/worldcup-iptv-player.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
